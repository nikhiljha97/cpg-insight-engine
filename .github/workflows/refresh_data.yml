# ============================================================
# GitHub Actions — Automatic Data Refresh every 4 hours
#
# What it does:
#   1. Wakes the Render backend (free tier sleeps after 15 min)
#   2. Busts the StatCan retail cache → fetches fresh TV-page data
#   3. Busts the traffic cache → fetches fresh 511 Ontario data
#   4. Pings /api/weather for Mississauga to warm the weather cache
#   5. Logs the refresh timestamp as a GitHub Actions summary
#
# Cost: uses ~2 GitHub Actions minutes per run
#       Free tier = 2,000 min/month → this uses ~360 min/month
#       Well within the free limit.
#
# Schedule: every 4 hours, 7 days a week (UTC times)
#   00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
#   = 8pm, midnight, 4am, 8am, noon, 4pm Eastern
# ============================================================

name: Auto Data Refresh (every 4 hours)

on:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"   # every 4 hours, all days

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      API_BASE: https://cpg-insight-engine-api.onrender.com

    steps:
      # ── Step 1: Wake the Render backend ──────────────────────────
      # Render free tier spins down after 15 min of inactivity.
      # We hit /api/cities (lightest endpoint) first and wait up to 60s
      # for it to wake up before hitting the data endpoints.
      - name: Wake Render backend
        run: |
          echo "Waking backend at $API_BASE ..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$API_BASE/api/cities")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is awake ✅"
              break
            fi
            sleep 10
          done

      # ── Step 2: Bust StatCan cache (Ontario retail data) ─────────
      # The server caches this for 1 hour. Hitting it forces a fresh
      # TV-page scrape from StatCan to get the latest retail figures.
      - name: Refresh StatCan Ontario retail data
        run: |
          echo "Refreshing StatCan data..."
          RESPONSE=$(curl -s --max-time 30 "$API_BASE/api/statcan/ontario-retail")
          LAST_PERIOD=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          pts = d.get('data', [])
          if pts:
              last = pts[-1]
              print(f'Latest: {last[\"period\"]}  \${last[\"value\"]}M  trend={d[\"trend\"]}')
          else:
              print('No data returned')
          " 2>/dev/null || echo "Parse error")
          echo "StatCan → $LAST_PERIOD"

      # ── Step 3: Refresh GTA traffic ──────────────────────────────
      - name: Refresh GTA traffic data
        run: |
          echo "Refreshing GTA traffic..."
          RESPONSE=$(curl -s --max-time 20 "$API_BASE/api/traffic/gta")
          SUMMARY=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'Incidents: {d.get(\"incidentCount\",\"?\")}  Level: {d.get(\"disruptionLevel\",\"?\")}')
          " 2>/dev/null || echo "Parse error")
          echo "Traffic → $SUMMARY"

      # ── Step 4: Refresh weather for key cities ───────────────────
      - name: Refresh weather cache (key cities)
        run: |
          for CITY in "Mississauga" "Toronto" "Vancouver" "Calgary"; do
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$CITY'))")
            RESPONSE=$(curl -s --max-time 20 "$API_BASE/api/weather?city=$ENCODED")
            SUMMARY=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          t = d.get('trigger', {})
          print(f'{d.get(\"city\",{}).get(\"name\",\"?\")}: {t.get(\"avgTemp\",\"?\")}°C  triggered={t.get(\"triggered\",\"?\")}')
            " 2>/dev/null || echo "Parse error")
            echo "Weather → $SUMMARY"
          done

      # ── Step 5: Log summary ───────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## CPG Dashboard — Data Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time (UTC):** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Time (ET):**  $(TZ='America/Toronto' date '+%Y-%m-%d %H:%M:%S ET')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ StatCan Ontario retail refreshed" >> $GITHUB_STEP_SUMMARY
          echo "✅ GTA traffic refreshed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Weather cache warmed (4 cities)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Next run in 4 hours. View logs above for data values._" >> $GITHUB_STEP_SUMMARY
